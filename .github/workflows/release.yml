name: Release

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6
        with:
          version: 10.33.0
          standalone: true
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive release version from tag
        id: release_version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '$RELEASE_TAG' is not a valid semver tag."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PLUGIN_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Stamp package version from tag
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: npm pkg set version="$RELEASE_VERSION"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        env:
          PLUGIN_VERSION: ${{ steps.release_version.outputs.version }}
        run: pnpm build

      - name: Publish to npm
        env:
          PLUGIN_VERSION: ${{ steps.release_version.outputs.version }}
        run: npm publish --access public --provenance
